<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner - Plan Your Perfect Trip</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>✈️ AI Travel Planner</h1>
                <p class="subtitle">Plan your perfect trip with AI-powered recommendations</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Chat Container -->
            <div class="chat-container full-width">
                <!-- Messages Display -->
                <div class="messages-panel" id="messagesPanel">
                    <div class="message system">
                        <div class="message-content">
                            👋 Welcome! Tell me about your trip. I'll help you plan the perfect itinerary.
                            <br><br>
                            <small>You can say things like: "I want to travel to Paris for 5 days with a 50000 budget"</small>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="userInput" 
                            placeholder="Where would you like to go?" 
                            autocomplete="off"
                            class="chat-input"
                        >
                        <button id="sendBtn" class="send-btn">Send</button>
                    </div>
                    <div id="loadingIndicator" class="loading-indicator hidden">
                        <span class="spinner"></span> Processing...
                    </div>
                </div>
            </div>
        </main>

        <!-- Error Toast -->
        <div id="errorToast" class="toast hidden"></div>
    </div>

    <script src="static/js/app.js"></script>
</body>
</html>
